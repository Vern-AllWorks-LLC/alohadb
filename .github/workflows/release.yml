name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v20.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: ubuntu-22.04-arm
            platform: linux-aarch64
          - os: macos-latest
            platform: macos-arm64
          - os: macos-13
            platform: macos-x86_64
          - os: windows-latest
            platform: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      # ---- Linux dependencies -----------------------------------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential meson ninja-build pkg-config \
            libreadline-dev libssl-dev libzstd-dev liblz4-dev \
            zlib1g-dev libicu-dev libcurl4-openssl-dev \
            python3 bison flex

      # ---- macOS dependencies -----------------------------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install meson ninja pkg-config \
            readline openssl zstd lz4 icu4c curl \
            bison flex
          # Brew bison/flex are newer than the system versions; put them first
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix flex)/bin"  >> $GITHUB_PATH

      # ---- Windows dependencies (MSYS2/MinGW64) -----------------------------
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-curl-winssl
            mingw-w64-x86_64-python
            bison
            flex
            zip

      # ---- Build: Linux / macOS ---------------------------------------------
      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          # macOS: help pkg-config find brew-installed libraries
          if [ "$(uname -s)" = "Darwin" ]; then
            export PKG_CONFIG_PATH="\
          $(brew --prefix openssl)/lib/pkgconfig:\
          $(brew --prefix icu4c)/lib/pkgconfig:\
          $(brew --prefix readline)/lib/pkgconfig:\
          $(brew --prefix zstd)/lib/pkgconfig:\
          $(brew --prefix lz4)/lib/pkgconfig:\
          $(brew --prefix curl)/lib/pkgconfig:\
          ${PKG_CONFIG_PATH:-}"
          fi

          meson setup builddir \
            --prefix=/usr/local/alohadb \
            -Drpath=true \
            -Dssl=openssl

      - name: Compile (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)
          ninja -C builddir -j"$JOBS"

      - name: Stage & package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          DESTDIR="$PWD/stage" ninja -C builddir install
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          ARCHIVE="alohadb-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar -czf "$ARCHIVE" -C stage .
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      # ---- Build: Windows (MSYS2 shell) -------------------------------------
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          meson setup builddir \
            --prefix=/c/alohadb \
            -Drpath=true \
            -Dssl=openssl

      - name: Compile (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ninja -C builddir -j$(nproc)

      - name: Stage & package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          DESTDIR="$PWD/stage" ninja -C builddir install
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          ARCHIVE="alohadb-${VERSION}-${{ matrix.platform }}.zip"
          cd stage && zip -r "../$ARCHIVE" . && cd ..
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      # ---- Upload to GitHub Release -----------------------------------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
